<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes dna-spin { 0%{stroke-dashoffset:0} 100%{stroke-dashoffset:-60} }
    @keyframes pulse-ring { 0%,100%{r:14;opacity:.9} 50%{r:18;opacity:.4} }
    @keyframes float-up { 0%{transform:translateY(0px)} 50%{transform:translateY(-6px)} 100%{transform:translateY(0px)} }
    @keyframes heartbeat { 0%,40%,60%,100%{stroke-dashoffset:420} 20%{stroke-dashoffset:180} 50%{stroke-dashoffset:0} }
    @keyframes molecule-rot { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    @keyframes data-blink { 0%,100%{opacity:0} 50%{opacity:1} }
    @keyframes slide-in-left { 0%{opacity:0;transform:translateX(-30px)} 100%{opacity:1;transform:translateX(0)} }
    @keyframes slide-in-right { 0%{opacity:0;transform:translateX(30px)} 100%{opacity:1;transform:translateX(0)} }
    @keyframes fade-up { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes glow-pulse { 0%,100%{opacity:.3} 50%{opacity:.7} }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes atom-orb { 0%{transform:rotate(0deg) translateX(30px) rotate(0deg)} 100%{transform:rotate(360deg) translateX(30px) rotate(-360deg)} }
    @keyframes atom-orb2 { 0%{transform:rotate(120deg) translateX(24px) rotate(-120deg)} 100%{transform:rotate(480deg) translateX(24px) rotate(-480deg)} }
    @keyframes atom-orb3 { 0%{transform:rotate(240deg) translateX(20px) rotate(-240deg)} 100%{transform:rotate(600deg) translateX(20px) rotate(-600deg)} }
    @keyframes cross-pulse { 0%,100%{opacity:.6;transform:scale(1)} 50%{opacity:1;transform:scale(1.06)} }
    @keyframes flask-bubble { 0%{transform:translateY(0);opacity:.7} 100%{transform:translateY(-28px);opacity:0} }
    @keyframes ecg-draw { 0%{stroke-dashoffset:400} 100%{stroke-dashoffset:0} }
    .dna-strand { stroke-dasharray:6 4; animation: dna-spin 3s linear infinite; }
    .dna-strand2 { stroke-dasharray:6 4; animation: dna-spin 3s linear infinite reverse; }
    .float { animation: float-up 3s ease-in-out infinite; }
    .cross-a { animation: cross-pulse 2s ease-in-out infinite; transform-origin: 586px 170px; }
    .bubble1 { animation: flask-bubble 2.2s ease-in infinite; }
    .bubble2 { animation: flask-bubble 2.8s ease-in .6s infinite; }
    .bubble3 { animation: flask-bubble 2.5s ease-in 1.2s infinite; }
  </style>
  <pattern id="hex-bg" x="0" y="0" width="40" height="35" patternUnits="userSpaceOnUse">
    <polygon points="20,2 38,11 38,29 20,38 2,29 2,11" fill="none" stroke="#1D9E75" stroke-width="0.4" opacity="0.18"/>
  </pattern>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#04342C"/>
    <stop offset="100%" stop-color="#042C53"/>
  </linearGradient>
  <linearGradient id="flask-liq" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1D9E75" stop-opacity=".9"/>
    <stop offset="100%" stop-color="#0F6E56" stop-opacity=".95"/>
  </linearGradient>
  <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#5DCAA5"/>
    <stop offset="50%" stop-color="#85B7EB"/>
    <stop offset="100%" stop-color="#5DCAA5"/>
  </linearGradient>
  <clipPath id="ticker-clip"><rect x="156" y="381" width="368" height="20" rx="10"/></clipPath>
</defs>

<!-- Background -->
<rect width="680" height="420" fill="url(#bg-grad)"/>
<rect width="680" height="420" fill="url(#hex-bg)"/>

<!-- LEFT PANEL — DNA HELIX -->
<g style="animation: slide-in-left .8s ease-out both">
  <rect x="20" y="20" width="115" height="380" rx="12" fill="#085041" fill-opacity="0.5" stroke="#1D9E75" stroke-width="0.8" stroke-opacity="0.5"/>
  <path class="dna-strand" fill="none" stroke="#5DCAA5" stroke-width="2"
    d="M77,40 C100,55 57,70 77,85 C100,100 57,115 77,130 C100,145 57,160 77,175 C100,190 57,205 77,220 C100,235 57,250 77,265 C100,280 57,295 77,310 C100,325 57,340 77,355 C100,370 57,385 77,400"/>
  <path class="dna-strand2" fill="none" stroke="#378ADD" stroke-width="2"
    d="M77,40 C55,55 100,70 77,85 C55,100 100,115 77,130 C55,145 100,160 77,175 C55,190 100,205 77,220 C55,235 100,250 77,265 C55,280 100,295 77,310 C55,325 100,340 77,355 C55,370 100,385 77,400"/>
  <g opacity="0.6">
    <line x1="65" y1="62" x2="90" y2="62" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="60" y1="85" x2="95" y2="85" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="108" x2="90" y2="108" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="58" y1="131" x2="97" y2="131" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="154" x2="90" y2="154" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="60" y1="177" x2="95" y2="177" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="200" x2="90" y2="200" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="58" y1="223" x2="97" y2="223" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="246" x2="90" y2="246" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="60" y1="269" x2="95" y2="269" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="292" x2="90" y2="292" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="58" y1="315" x2="97" y2="315" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="338" x2="90" y2="338" stroke="#9FE1CB" stroke-width="1.5"/>
    <line x1="60" y1="361" x2="95" y2="361" stroke="#B5D4F4" stroke-width="1.5"/>
    <line x1="65" y1="384" x2="90" y2="384" stroke="#9FE1CB" stroke-width="1.5"/>
  </g>
  <text font-family="monospace" font-size="9" fill="#9FE1CB" opacity="0.7" text-anchor="middle" x="77" y="415">D N A</text>
</g>

<!-- RIGHT PANEL -->
<g style="animation: slide-in-right .8s ease-out both">
  <rect x="545" y="20" width="115" height="380" rx="12" fill="#0C447C" fill-opacity="0.45" stroke="#378ADD" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Flask -->
  <polygon points="603,60 590,60 570,140 635,140" fill="#0F6E56" fill-opacity="0.35" stroke="#5DCAA5" stroke-width="1.2"/>
  <polygon points="572,125 633,125 630,140 575,140" fill="url(#flask-liq)" opacity="0.9"/>
  <rect x="595" y="45" width="16" height="18" rx="3" fill="none" stroke="#5DCAA5" stroke-width="1.2"/>
  <rect x="590" y="57" width="26" height="6" rx="2" fill="none" stroke="#5DCAA5" stroke-width="1"/>
  <circle class="bubble1" cx="585" cy="125" r="3" fill="none" stroke="#9FE1CB" stroke-width="1"/>
  <circle class="bubble2" cx="600" cy="130" r="2" fill="none" stroke="#9FE1CB" stroke-width="1"/>
  <circle class="bubble3" cx="618" cy="122" r="2.5" fill="none" stroke="#9FE1CB" stroke-width="1"/>
  <!-- Medical cross -->
  <g class="cross-a">
    <rect x="572" y="163" width="28" height="8" rx="2" fill="#E24B4A" fill-opacity="0.85"/>
    <rect x="582" y="153" width="8" height="28" rx="2" fill="#E24B4A" fill-opacity="0.85"/>
  </g>
  <!-- Atom -->
  <g transform="translate(603,270)">
    <circle cx="0" cy="0" r="7" fill="#EF9F27" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="#FCDE5A"/>
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="#B5D4F4" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="#B5D4F4" stroke-width="0.8" opacity="0.5" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="28" ry="12" fill="none" stroke="#B5D4F4" stroke-width="0.8" opacity="0.5" transform="rotate(120)"/>
    <circle cx="0" cy="0" r="3.5" fill="#85B7EB" style="animation:atom-orb 2s linear infinite"/>
    <circle cx="0" cy="0" r="3" fill="#9FE1CB" style="animation:atom-orb2 3s linear infinite"/>
    <circle cx="0" cy="0" r="2.5" fill="#FAC775" style="animation:atom-orb3 4s linear infinite"/>
  </g>
  <!-- Microscope -->
  <g transform="translate(572,320)" opacity="0.75" stroke="#9FE1CB" stroke-width="1.2" fill="none">
    <rect x="10" y="0" width="26" height="10" rx="2"/>
    <rect x="16" y="10" width="14" height="20" rx="1"/>
    <rect x="12" y="30" width="22" height="5" rx="2"/>
    <line x1="23" y1="35" x2="23" y2="50"/>
    <line x1="10" y1="50" x2="36" y2="50"/>
    <circle cx="32" cy="5" r="4" fill="none"/>
  </g>
</g>

<!-- ECG LINE -->
<g style="animation: fade-up 1s ease-out .4s both">
  <path fill="none" stroke="#5DCAA5" stroke-width="1.5" opacity="0.35"
    d="M145,200 L200,200 L215,200 L225,160 L235,240 L250,170 L265,200 L310,200 L320,200 L330,165 L340,235 L355,175 L365,200 L420,200 L430,200 L440,162 L450,238 L465,172 L475,200 L530,200"/>
  <path fill="none" stroke="#5DCAA5" stroke-width="2.2" opacity="0.9"
    style="stroke-dasharray:400;stroke-dashoffset:400;animation:ecg-draw 4s ease-in-out infinite"
    d="M145,200 L200,200 L215,200 L225,160 L235,240 L250,170 L265,200 L310,200 L320,200 L330,165 L340,235 L355,175 L365,200 L420,200 L430,200 L440,162 L450,238 L465,172 L475,200 L530,200"/>
</g>

<!-- CENTRE CONTENT -->
<g style="animation: fade-up 1s ease-out .2s both">
  <!-- Corner brackets -->
  <path d="M155,40 L155,28 L167,28" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M525,40 L525,28 L513,28" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M155,380 L155,392 L167,392" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M525,380 L525,392 L513,392" fill="none" stroke="#5DCAA5" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Version pill -->
  <rect x="289" y="38" width="102" height="18" rx="9" fill="#1D9E75" fill-opacity="0.35" stroke="#5DCAA5" stroke-width="0.8"/>
  <text font-family="monospace" font-size="10" fill="#9FE1CB" text-anchor="middle" x="340" y="51">v 4 . 0  —  O P E N  S O U R C E</text>
  <!-- Main title -->
  <text font-family="monospace" font-weight="bold" font-size="28" fill="url(#title-grad)" text-anchor="middle" x="340" y="100">DrugGeneExplorer</text>
  <!-- Subtitle -->
  <text font-family="monospace" font-size="11" fill="#9FE1CB" fill-opacity="0.85" text-anchor="middle" x="340" y="120">Pharmacological Research Terminal</text>
  <!-- Separators -->
  <line x1="160" y1="130" x2="310" y2="130" stroke="#1D9E75" stroke-width="0.8" opacity="0.6"/>
  <circle cx="340" cy="130" r="3" fill="#5DCAA5"/>
  <line x1="370" y1="130" x2="520" y2="130" stroke="#1D9E75" stroke-width="0.8" opacity="0.6"/>
  <!-- API badges -->
  <g font-family="monospace" font-size="9.5">
    <rect x="168" y="145" width="68" height="16" rx="5" fill="#085041" stroke="#5DCAA5" stroke-width="0.7"/>
    <text fill="#9FE1CB" text-anchor="middle" x="202" y="157">DGIdb</text>
    <rect x="246" y="145" width="72" height="16" rx="5" fill="#0C447C" stroke="#85B7EB" stroke-width="0.7"/>
    <text fill="#B5D4F4" text-anchor="middle" x="282" y="157">PubChem</text>
    <rect x="328" y="145" width="68" height="16" rx="5" fill="#26215C" stroke="#AFA9EC" stroke-width="0.7"/>
    <text fill="#CECBF6" text-anchor="middle" x="362" y="157">ChEMBL</text>
    <rect x="406" y="145" width="68" height="16" rx="5" fill="#501313" stroke="#F09595" stroke-width="0.7"/>
    <text fill="#F7C1C1" text-anchor="middle" x="440" y="157">OpenFDA</text>
    <rect x="168" y="169" width="72" height="16" rx="5" fill="#173404" stroke="#97C459" stroke-width="0.7"/>
    <text fill="#C0DD97" text-anchor="middle" x="204" y="181">Trials.gov</text>
    <rect x="250" y="169" width="82" height="16" rx="5" fill="#26215C" stroke="#AFA9EC" stroke-width="0.7"/>
    <text fill="#CECBF6" text-anchor="middle" x="291" y="181">Open Targets</text>
    <rect x="342" y="169" width="60" height="16" rx="5" fill="#042C53" stroke="#85B7EB" stroke-width="0.7"/>
    <text fill="#B5D4F4" text-anchor="middle" x="372" y="181">UniProt</text>
    <rect x="412" y="169" width="62" height="16" rx="5" fill="#412402" stroke="#EF9F27" stroke-width="0.7"/>
    <text fill="#FAC775" text-anchor="middle" x="443" y="181">PubMed</text>
    <rect x="255" y="193" width="70" height="16" rx="5" fill="#04342C" stroke="#5DCAA5" stroke-width="0.7"/>
    <text fill="#9FE1CB" text-anchor="middle" x="290" y="205">GWAS Catalog</text>
    <rect x="335" y="193" width="84" height="16" rx="5" fill="#501313" stroke="#F09595" stroke-width="0.7"/>
    <text fill="#F7C1C1" text-anchor="middle" x="377" y="205">20+ Languages</text>
  </g>
  <!-- Feature pills -->
  <g font-family="monospace" font-size="9.5" style="animation: fade-up 1s ease-out .7s both">
    <rect x="162" y="228" width="86" height="20" rx="10" fill="#1D9E75" fill-opacity="0.2" stroke="#5DCAA5" stroke-width="0.8"/>
    <text fill="#5DCAA5" text-anchor="middle" x="205" y="242">PK/PD Calc</text>
    <rect x="256" y="228" width="86" height="20" rx="10" fill="#185FA5" fill-opacity="0.2" stroke="#85B7EB" stroke-width="0.8"/>
    <text fill="#85B7EB" text-anchor="middle" x="299" y="242">DDI Network</text>
    <rect x="350" y="228" width="88" height="20" rx="10" fill="#533AB7" fill-opacity="0.2" stroke="#AFA9EC" stroke-width="0.8"/>
    <text fill="#AFA9EC" text-anchor="middle" x="394" y="242">GWAS OMICS</text>
    <rect x="446" y="228" width="82" height="20" rx="10" fill="#3B6D11" fill-opacity="0.2" stroke="#97C459" stroke-width="0.8"/>
    <text fill="#97C459" text-anchor="middle" x="487" y="242">DrugScore</text>
  </g>
  <!-- Separator dashed -->
  <line x1="160" y1="268" x2="520" y2="268" stroke="#1D9E75" stroke-width="0.5" opacity="0.4" stroke-dasharray="4 4"/>
  <!-- Creator card -->
  <g style="animation: fade-up 1s ease-out 1s both">
    <rect x="185" y="278" width="310" height="58" rx="10" fill="#042C53" fill-opacity="0.6" stroke="#378ADD" stroke-width="0.8"/>
    <!-- Hex avatar -->
    <polygon points="222,307 213,316 222,325 235,325 244,316 235,307" fill="#1D9E75" fill-opacity="0.4" stroke="#5DCAA5" stroke-width="1"/>
    <circle cx="228" cy="316" r="14" fill="none" stroke="#5DCAA5" stroke-width="0.8" opacity="0.4" style="animation:pulse-ring 2s ease-in-out infinite"/>
    <text font-family="monospace" font-weight="bold" font-size="10" fill="#9FE1CB" text-anchor="middle" x="228" y="320">F</text>
    <text font-family="monospace" font-weight="bold" font-size="14" fill="#85B7EB" x="254" y="298">Florvex</text>
    <text font-family="monospace" font-size="9" fill="#B5D4F4" fill-opacity="0.85" x="254" y="314">Creator · Self-taught developer</text>
    <text font-family="monospace" font-size="8.5" fill="#9FE1CB" fill-opacity="0.65" x="254" y="328">Programming · AI · Medicine &amp; Biology</text>
  </g>
  <!-- Badges row -->
  <g font-family="monospace" font-size="9" style="animation: fade-up 1s ease-out 1.1s both">
    <rect x="185" y="346" width="148" height="18" rx="9" fill="#FFDD00" fill-opacity="0.12" stroke="#FAC775" stroke-width="0.8"/>
    <text fill="#FAC775" text-anchor="middle" x="259" y="358">buymeacoffee / florvex</text>
    <rect x="342" y="346" width="152" height="18" rx="9" fill="#26A5E4" fill-opacity="0.12" stroke="#85B7EB" stroke-width="0.8"/>
    <text fill="#85B7EB" text-anchor="middle" x="418" y="358">Telegram: @florvexchannel</text>
  </g>
  <!-- Ticker bar -->
  <g style="animation: fade-up 1s ease-out 1.2s both">
    <rect x="155" y="380" width="370" height="22" rx="11" fill="#04342C" fill-opacity="0.8" stroke="#1D9E75" stroke-width="0.8"/>
    <g clip-path="url(#ticker-clip)">
      <text font-family="monospace" font-size="9" fill="#5DCAA5" y="395" opacity="0.85" style="animation:ticker 18s linear infinite">
        <tspan x="160">  MIT Open Source  ·  21 Research Modules  ·  9 Biomedical APIs  ·  Pharmacokinetics  ·  DDI Network  ·  GWAS OMICS  ·  DrugScore  ·  MIT Open Source  ·  21 Research Modules  ·  9 Biomedical APIs  ·  Pharmacokinetics  ·  DDI Network  ·  GWAS OMICS  ·  DrugScore  ·</tspan>
      </text>
    </g>
  </g>
</g>
</svg>
